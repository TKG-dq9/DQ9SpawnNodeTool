                        if (layoutStr[j] !== '0') nonZeroIndices.push(j);
                    }

                    if (nonZeroIndices.length > 0) {
                        const chosenIndex = nonZeroIndices[r1 % modVal]; // Orientation 0-8

                        const xNibble = i & 0x0F;
                        const zNibble = (i & 0xF0) >> 4;

                        const baseX = (xNibble * 8 + 4) * 0x1000;
                        const baseZ = (zNibble * 8 + 4) * 0x1000;

                        let modX = 0, modZ = 0;

                        if (['E3', '8F', '3E', 'F8'].includes(tileId)) {
                            modX = exceptions[chosenIndex].x;
                            modZ = exceptions[chosenIndex].z;
                        } else {
                            modX = modifiers[chosenIndex].x;
                            modZ = modifiers[chosenIndex].z;
                        }

                        const finalX = (baseX + modX) >> 12;
                        const finalZ = (baseZ + modZ) >> 12;

                        coords.push({ x: finalX, z: finalZ });
                    }
                }
            }
            return coords;
        }

        function drawOverlapCanvas(markers) {
            const canvas = document.getElementById("overlapCanvas");
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const width = canvas.width;
            const height = canvas.height;

            const countCanvas = document.createElement("canvas");
            countCanvas.width = width;
            countCanvas.height = height;
            const countCtx = countCanvas.getContext("2d");
            const image = countCtx.createImageData(width, height);
            const counts = new Uint8Array(width * height);

            markers.forEach(m => {
                const minX = Math.max(0, Math.floor(m.px - m.r));
                const maxX = Math.min(width - 1, Math.ceil(m.px + m.r));
                const minY = Math.max(0, Math.floor(m.py - m.r));
                const maxY = Math.min(height - 1, Math.ceil(m.py + m.r));

                for (let y = minY; y <= maxY; y++) {
                    for (let x = minX; x <= maxX; x++) {
                        const dx = x - m.px;
                        const dy = y - m.py;
                        if (dx * dx + dy * dy <= m.r * m.r) {
                            counts[y * width + x]++;
                        }
                    }
                }
            });

            const pixels = image.data;
            for (let i = 0; i < counts.length; i++) {
                if (counts[i] >= 2) {
                    pixels[i * 4 + 0] = 0;     // red
                    pixels[i * 4 + 1] = 255;   // green
                    pixels[i * 4 + 2] = 0;     // blue
                    pixels[i * 4 + 3] = 127;   // alpha
                }
            }

            countCtx.putImageData(image, 0, 0);
            ctx.drawImage(countCanvas, 0, 0);
        }

        function drawCoordinateOverlay(coords) {
            const overlay = document.getElementById("overlay");
            overlay.innerHTML = "";
            const markers = [];
            const PIXELS_PER_UNIT = 8;

            coords.forEach(c => {
                const px = c.x * PIXELS_PER_UNIT;
                const py = c.z * PIXELS_PER_UNIT;

                const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");

                circle.setAttribute("cx", px);
                circle.setAttribute("cy", py);
                circle.setAttribute("r", 3.5 * PIXELS_PER_UNIT);
                circle.setAttribute("fill", "rgba(64,64,64,.18)");
                circle.setAttribute("stroke", "#404040");
                circle.setAttribute("stroke-width", "2");

                const h = document.createElementNS("http://www.w3.org/2000/svg", "line");
                h.setAttribute("x1", px - 4); h.setAttribute("y1", py);
                h.setAttribute("x2", px + 4); h.setAttribute("y2", py);
                h.setAttribute("stroke", "#404040");
                h.setAttribute("stroke-width", "2");

                const v = document.createElementNS("http://www.w3.org/2000/svg", "line");
                v.setAttribute("x1", px); v.setAttribute("y1", py - 4);
                v.setAttribute("x2", px); v.setAttribute("y2", py + 4);
                v.setAttribute("stroke", "#404040");
                v.setAttribute("stroke-width", "2");

                group.appendChild(circle);
                group.appendChild(h);
                group.appendChild(v);

                markers.push({ px, py, r: 3.5 * PIXELS_PER_UNIT });
                overlay.appendChild(group);
            });

            drawOverlapCanvas(markers);
        }

        function buildBitfieldTokens() {
            const tokens = new Array(256).fill('FF');
            for (let y = 0; y < mapHeight && y < 16; y++) {
                for (let x = 0; x < mapWidth && x < 16; x++) {
                    tokens[y * 16 + x] = bitfieldGrid[y][x].toString(16).toUpperCase().padStart(2, '0');
                }
            }
            return tokens;
        }

        function renderSpriteGrid(seedHex, floor, tokens) {
            const envString = getEnvironment(seedHex);

            const gridContainer = document.getElementById('spriteGrid');
            gridContainer.innerHTML = '';

            const TILE_SIZE = 32;

            for (let i = 0; i < 256; i++) {
                const bitfield = tokens[i] || 'FF';
                const spriteId = tileMap[bitfield];
                const cell = document.createElement('div');
                cell.className = 'sprite-cell';

                if (spriteId) {
                    const decIndex = parseInt(spriteId, 16);
                    const xOffset = envIndices[envString] * TILE_SIZE;
                    const yOffset = decIndex * TILE_SIZE;

                    cell.style.backgroundImage = `url('${SPRITESHEET}')`;
                    cell.style.backgroundSize = `${TILE_SIZE * 2 * 5}px auto`;
                    cell.style.backgroundPosition = `-${xOffset * 2}px -${yOffset * 2}px`;
                } else {
                    cell.classList.add('unknown');
                    cell.innerText = '??';
                }
                gridContainer.appendChild(cell);
            }

            const coords = calculateCoords(tokens, envString, floor);
            drawCoordinateOverlay(coords);
        }

        function drawMajorGrid(size) {
            const svg = document.getElementById("majorGrid");

            svg.innerHTML = "";
            svg.setAttribute("width", size);
            svg.setAttribute("height", size);
            svg.setAttribute("viewBox", `0 0 ${size} ${size}`);

            const cell = size / 16;

            for (let i = 0; i <= 16; i++) {
                const p = i * cell;

                const v = document.createElementNS("http://www.w3.org/2000/svg", "line");
                v.setAttribute("x1", p);
                v.setAttribute("y1", 0);
                v.setAttribute("x2", p);
                v.setAttribute("y2", size);
                v.setAttribute("stroke", "black");
                v.setAttribute("stroke-width", size >= 1024 ? "2" : "1");

                svg.appendChild(v);

                const h = document.createElementNS("http://www.w3.org/2000/svg", "line");
                h.setAttribute("x1", 0);
                h.setAttribute("y1", p);
                h.setAttribute("x2", size);
                h.setAttribute("y2", p);
                h.setAttribute("stroke", "black");
                h.setAttribute("stroke-width", size >= 1024 ? "2" : "1");

                svg.appendChild(h);
            }
        }

        function scaleRenderedOutput() {
            const wrapper = document.querySelector(".grid-wrapper");
            const outer = document.querySelector(".grid-scale-wrapper");

            const displaySize = Math.min(window.innerWidth * 0.95, 1024);
            const scale = displaySize / 1024;

            wrapper.style.transform = `scale(${scale})`;
            wrapper.style.transformOrigin = "top left";

            outer.style.width = `${displaySize}px`;
            outer.style.height = `${displaySize}px`;

            drawMajorGrid(displaySize);

            wrapper.classList.toggle("show-subgrid", scale >= 0.999);
        }

        function run() {
            const seedInput = document.getElementById('mapSeed').value;
            const seedStr = seedInput.replace(/^0x/i, "");
            const mapSeed = parseInt(seedStr, 16);
            const floor = parseInt(document.getElementById('floor').value, 10);

            if (isNaN(mapSeed) || isNaN(floor)) {
                return;
            }

            FUN_02090444(mapSeed, floor);

            const tokens = buildBitfieldTokens();
            renderSpriteGrid(seedStr, floor, tokens);
            scaleRenderedOutput();
        }

        document.getElementById('mapSeed').addEventListener('input', run);
        document.getElementById('floor').addEventListener('input', run);

        let resizeTimer;

        window.addEventListener("resize", () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(scaleRenderedOutput, 100);
        });

        run();
    </script>
</body>
</html>
